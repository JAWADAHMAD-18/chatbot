<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Guidance Portal - AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Myra Chatbot Only UI -->
    <div class="myra-chatbot-container">
        <main class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="bot-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <h3>Hi, I'm Myra! 916</h3>
                        <p>I am your student guidance chatbot. Ask me anything about careers, courses, exams, or appointments.</p>
                    </div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </main>
        <div class="chat-input-container">
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type your question..." maxlength="500">
                <button id="sendButton" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-footer">
                <span class="character-count" id="characterCount">0/500</span>
            </div>
        </div>
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-spinner">
                <i class="fas fa-robot fa-spin"></i>
                <p>Connecting to Myra...</p>
            </div>
        </div>
        <div class="error-toast" id="errorToast" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage">Something went wrong. Please try again.</span>
            <button class="close-toast" onclick="hideErrorToast()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="success-toast" id="successToast" style="display: none;">
            <i class="fas fa-check-circle"></i>
            <span id="successMessage">Action completed successfully!</span>
            <button class="close-toast" onclick="hideSuccessToast()">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    <footer class="footer">
        &copy; 2024 Jawad Institute &mdash; Powered by Myra AI Guidance Chatbot
    </footer>
    <script src="script.js"></script>
    <script>
    // Add/remove .chat-started class based on chat activity
    (function() {
        const container = document.querySelector('.myra-chatbot-container');
        const chatMessages = document.getElementById('chatMessages');
        const input = document.getElementById('messageInput');
        let chatStarted = false;
        function checkChatStarted() {
            // If there is more than just the welcome message, chat has started
            if (chatMessages && chatMessages.children.length > 1) {
                if (!chatStarted) {
                    container.classList.add('chat-started');
                    chatStarted = true;
                }
            } else {
                if (chatStarted) {
                    container.classList.remove('chat-started');
                    chatStarted = false;
                }
            }
        }
        // Initial check
        checkChatStarted();
        // Listen for DOM changes in chat
        const observer = new MutationObserver(checkChatStarted);
        if (chatMessages) {
            observer.observe(chatMessages, { childList: true });
        }
        // Also check on input (in case of programmatic chat clear)
        input && input.addEventListener('input', checkChatStarted);
    })();
    </script>
</body>
</html>
